pipeline:
  name: default
  description: Standard build and test pipeline for the calculator project

stages:
  - lint
  - test

lint-check:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install pyflakes --quiet
    - python -m pyflakes src/main.py

run-tests:
  stage: test
  image: python:3.12-slim
  script:
    - pip install pytest --quiet
    - pytest tests/ -v